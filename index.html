<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberSim — Murtaza</title>
    <meta name="description" content="CyberSim — Immersive cybersecurity awareness training" />
    <meta name="author" content="Murtaza" />
    <meta property="og:title" content="CyberSim" />
    <meta property="og:description" content="Immersive cybersecurity awareness training" />
    <meta property="og:type" content="website" />

    <style>
      /* ── CyberSim boot screen — visible before React hydrates ── */
      #cs-boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #03060f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Courier New', Courier, monospace;
        overflow: hidden;
        transition: opacity 0.5s ease;
      }

      /* grid overlay */
      #cs-boot::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
      }

      /* scanline sweep */
      #cs-boot::after {
        content: '';
        position: absolute;
        left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg, transparent, rgba(0,229,255,0.5), transparent);
        animation: cs-scan 2.4s ease-in-out infinite;
        pointer-events: none;
      }
      @keyframes cs-scan {
        0%   { top: -4px; opacity: 0; }
        10%  { opacity: 1; }
        90%  { opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }

      .cs-wordmark {
        font-size: clamp(2.4rem, 6vw, 4.2rem);
        font-weight: 900;
        letter-spacing: 0.18em;
        color: #00e5ff;
        text-shadow:
          0 0 12px rgba(0,229,255,0.9),
          0 0 40px rgba(0,229,255,0.4),
          0 0 80px rgba(0,229,255,0.15);
        animation: cs-pulse 2.8s ease-in-out infinite;
        position: relative;
      }
      .cs-wordmark span {
        color: #fff;
        text-shadow: 0 0 8px rgba(255,255,255,0.6);
      }
      @keyframes cs-pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.85; }
      }

      .cs-tagline {
        margin-top: 0.5rem;
        font-size: 0.72rem;
        letter-spacing: 0.35em;
        color: rgba(0,229,255,0.5);
        text-transform: uppercase;
      }

      .cs-divider {
        width: 260px;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(0,229,255,0.6), transparent);
        margin: 2.4rem 0 2rem;
      }

      .cs-loading-label {
        font-size: 0.68rem;
        letter-spacing: 0.4em;
        color: rgba(0,229,255,0.55);
        text-transform: uppercase;
        margin-bottom: 0.9rem;
      }

      .cs-bar-track {
        width: 260px;
        height: 3px;
        background: rgba(0,229,255,0.1);
        border-radius: 2px;
        overflow: hidden;
        position: relative;
      }
      .cs-bar-fill {
        position: absolute;
        top: 0; left: 0;
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #00e5ff, #7dd3fc);
        box-shadow: 0 0 8px rgba(0,229,255,0.8);
        border-radius: 2px;
        animation: cs-load 1.6s cubic-bezier(0.4,0,0.2,1) forwards;
      }
      @keyframes cs-load {
        0%   { width: 0%; }
        30%  { width: 45%; }
        60%  { width: 72%; }
        85%  { width: 91%; }
        100% { width: 100%; }
      }

      .cs-status {
        margin-top: 1.1rem;
        font-size: 0.62rem;
        letter-spacing: 0.2em;
        color: rgba(0,229,255,0.35);
        height: 1em;
        animation: cs-blink-status 1.6s steps(1) infinite;
      }
      @keyframes cs-blink-status {
        0%,49% { opacity: 1; }
        50%,100%{ opacity: 0; }
      }

      .cs-corner {
        position: absolute;
        width: 18px; height: 18px;
        border-color: rgba(0,229,255,0.35);
        border-style: solid;
      }
      .cs-corner.tl { top: 24px; left: 24px; border-width: 2px 0 0 2px; }
      .cs-corner.tr { top: 24px; right: 24px; border-width: 2px 2px 0 0; }
      .cs-corner.bl { bottom: 24px; left: 24px; border-width: 0 0 2px 2px; }
      .cs-corner.br { bottom: 24px; right: 24px; border-width: 0 2px 2px 0; }
    </style>
  </head>

  <body style="margin:0;background:#03060f;">
    <!-- Boot screen — hidden by JS once React is ready -->
    <div id="cs-boot" aria-label="Loading CyberSim">
      <div class="cs-corner tl"></div>
      <div class="cs-corner tr"></div>
      <div class="cs-corner bl"></div>
      <div class="cs-corner br"></div>

      <div class="cs-wordmark">CYBER<span>SIM</span></div>
      <div class="cs-tagline">Security Awareness Platform</div>

      <div class="cs-divider"></div>

      <div class="cs-loading-label">Initialising systems</div>
      <div class="cs-bar-track">
        <div class="cs-bar-fill"></div>
      </div>
      <div class="cs-status">ESTABLISHING SECURE CHANNEL_</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Fade out boot screen once React has painted its first frame
      (function () {
        var boot = document.getElementById('cs-boot');
        var minMs = 1800; // minimum display time so the animation plays fully
        var start = Date.now();

        function hide() {
          var elapsed = Date.now() - start;
          var delay   = Math.max(0, minMs - elapsed);
          setTimeout(function () {
            if (boot) {
              boot.style.opacity = '0';
              boot.style.pointerEvents = 'none';
              setTimeout(function () { boot && boot.remove(); }, 520);
            }
          }, delay);
        }

        // React calls requestIdleCallback / rAF after first commit
        if (typeof requestIdleCallback !== 'undefined') {
          requestIdleCallback(hide);
        } else {
          setTimeout(hide, 100); // fallback for Safari
        }
      })();
    </script>
  </body>
</html>
